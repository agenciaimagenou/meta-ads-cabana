<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meta Ads — Cabana Burger</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;
  --app:#16a34a;--ifood:#dc2626;--ifood-bar:#db2777;
  --muted:#94a3b8;--muted2:#475569;
}
*{font-family:'Inter',sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#0f172a;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px}
.kpi-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px 22px;transition:border-color .2s,transform .15s;cursor:default}
.kpi-card:hover{border-color:#94a3b8;transform:translateY(-1px)}
.section-title{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.section-title::before{content:'';width:3px;height:16px;background:var(--app);border-radius:2px;flex-shrink:0}
.section-title span{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted2);text-transform:uppercase}

.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
.mrow:last-child{border-bottom:none}
.mlabel{color:#64748b;font-weight:500}.mval{font-weight:700;color:#0f172a}

.bbar{background:#e2e8f0;border-radius:6px;height:8px;overflow:hidden}
.bbar-fill{height:100%;border-radius:6px;transition:width .6s}

.btn{padding:8px 16px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:#fff;color:var(--muted2)}
.btn:hover{background:#f1f5f9;color:#0f172a;border-color:#94a3b8}
.btn.active,.btn-p{background:var(--app)!important;color:#fff!important;border-color:var(--app)!important}
.btn-p:hover{background:#15803d!important}

.ctab{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap;background:transparent;color:var(--muted)}
.ctab.active{color:#0f172a!important;background:rgba(0,0,0,.06)}
.camp-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted2);font-weight:500;transition:background .12s;user-select:none}
.camp-row:hover{background:#f1f5f9;color:#0f172a}

.inp{background:#fff;border:1px solid #cbd5e1;color:#0f172a;padding:10px 14px;border-radius:9px;font-size:13px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--app)}
.inp::placeholder{color:#94a3b8}
label{font-size:12px;color:var(--muted2);font-weight:600;display:block;margin-bottom:6px}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.hidden{display:none!important}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease forwards}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}
.shimmer{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200%;animation:sh 1.2s infinite;border-radius:8px}

/* date trigger button */
.date-trigger-btn{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e8f0;color:var(--muted2);padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;min-width:190px}
.date-trigger-btn:hover{border-color:#94a3b8;color:#0f172a;background:#f8fafc}
.date-trigger-btn.open{border-color:rgba(22,163,74,.5);color:#0f172a;background:#f8fafc}
.date-trigger-btn .dt-chevron{transition:transform .2s;opacity:.4;margin-left:auto}
.date-trigger-btn.open .dt-chevron{transform:rotate(180deg);opacity:.7}

/* date dropdown */
.date-drop{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:6px;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,.12);min-width:260px}
.date-drop.hidden{display:none!important}

/* preset options inside dropdown */
.drop-opt{width:100%;text-align:left;padding:9px 12px;border:none;background:transparent;color:var(--muted2);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between;font-family:'Inter',sans-serif}
.drop-opt:hover{background:#f1f5f9;color:#0f172a}
.drop-opt.active{color:var(--app);background:rgba(22,163,74,.08);font-weight:700}
.drop-opt .check{width:14px;height:14px;flex-shrink:0}

/* custom range inputs */
.date-inp{background:#f8fafc;border:1px solid #e2e8f0;color:#0f172a;padding:8px 10px;border-radius:8px;font-size:12px;width:100%;outline:none;font-family:'Inter',sans-serif;color-scheme:light;transition:border-color .15s}
.date-inp:focus{border-color:rgba(22,163,74,.45)}

/* flatpickr */
.flatpickr-calendar{background:#fff!important;border:1px solid #e2e8f0!important;border-radius:16px!important;box-shadow:0 12px 40px rgba(0,0,0,.12)!important;padding:4px 8px 10px!important;font-family:'Inter',sans-serif!important}
.flatpickr-months{padding:8px 4px 4px!important}
.flatpickr-month{height:36px!important}
.flatpickr-current-month{font-size:14px!important;font-weight:700!important;padding-top:6px!important}
.flatpickr-current-month .flatpickr-monthDropdown-months{background:#fff!important;color:#0f172a!important;font-weight:700!important;font-size:14px!important}
.flatpickr-current-month input.cur-year{color:#0f172a!important;font-weight:700!important;font-size:14px!important}
.flatpickr-prev-month,.flatpickr-next-month{color:#94a3b8!important;fill:#94a3b8!important;padding:8px!important;top:10px!important}
.flatpickr-prev-month:hover,.flatpickr-next-month:hover{color:#0f172a!important;fill:#0f172a!important}
.flatpickr-months,.flatpickr-weekdays{background:transparent!important}
.flatpickr-weekdays{padding:4px 0!important}
.flatpickr-weekday{color:#94a3b8!important;font-size:11px!important;font-weight:700!important;letter-spacing:.5px!important}
.flatpickr-day{color:#475569!important;border-radius:8px!important;font-size:12px!important;font-weight:500!important;height:34px!important;line-height:34px!important;margin:1px!important}
.flatpickr-day:hover{background:#f1f5f9!important;color:#0f172a!important}
.flatpickr-day.today{border-color:#e2e8f0!important;color:#0f172a!important}
.flatpickr-day.today:hover{background:#f1f5f9!important}
.flatpickr-day.selected,.flatpickr-day.startRange,.flatpickr-day.endRange{background:var(--app)!important;border-color:var(--app)!important;color:#fff!important;font-weight:800!important}
.flatpickr-day.inRange{background:rgba(22,163,74,.1)!important;border-color:rgba(22,163,74,.06)!important;color:#475569!important;box-shadow:none!important}
.flatpickr-day.startRange{border-radius:8px 0 0 8px!important}
.flatpickr-day.endRange{border-radius:0 8px 8px 0!important}
.flatpickr-day.startRange.endRange{border-radius:8px!important}
.flatpickr-day.disabled{color:#cbd5e1!important}
.flatpickr-innerContainer{padding:0 4px!important}

.badge-app  {display:inline-flex;align-items:center;background:var(--app);color:#fff;padding:3px 14px;border-radius:20px;font-weight:800;font-size:11px;letter-spacing:.5px}
.badge-ifood{display:inline-flex;align-items:center;background:var(--ifood);color:#fff;padding:3px 14px;border-radius:20px;font-weight:800;font-size:11px;letter-spacing:.5px}

/* comparação */
.cmp-row{display:grid;grid-template-columns:1fr 130px 1fr;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{text-align:center;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.3px}
.cmp-a{text-align:right;font-weight:600}
.cmp-b{text-align:left;font-weight:600}
.win{color:var(--app)!important}
.lose{color:#cbd5e1!important;font-weight:400!important}

/* criativos */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:6px;margin-top:10px}
.thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0;cursor:zoom-in;transition:transform .15s,box-shadow .15s}
.thumb:hover{transform:scale(1.05);box-shadow:0 0 0 2px var(--app)}
.tname{font-size:9px;color:var(--muted);margin-top:3px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.lb{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:zoom-out}
.lb img{max-width:90vw;max-height:80vh;border-radius:10px;object-fit:contain}
.lb-n{font-size:12px;color:#94a3b8;max-width:80vw;text-align:center}

.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px;color:#dc2626;font-size:13px;line-height:1.8}

@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
}
@media(max-width:780px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important}
  .chart-grid{grid-template-columns:1fr!important}
  .duo{grid-template-columns:1fr!important}
  .duo-div{display:none!important}
  .cmp-wrap{display:none!important}
  .budget-grid{grid-template-columns:1fr 110px 50px!important}
  .budget-bar{display:none!important}
}
</style>
</head>
<body>

<!-- MODAL CONFIG -->
<div id="modalCfg" class="modal-bg hidden">
  <div class="modal fu">
    <div style="margin-bottom:22px">
      <div style="font-size:11px;color:var(--app);font-weight:700;letter-spacing:1px;margin-bottom:6px">CONFIGURAÇÕES</div>
      <h2 style="font-size:20px;font-weight:900">Meta Ads Dashboard</h2>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label>Access Token *</label><input id="cfgToken" class="inp" style="width:100%" type="password" placeholder="EAAxxxxxx"/></div>
      <div><label>Ad Account ID *</label><input id="cfgAccount" class="inp" style="width:100%" placeholder="act_849765918860539"/></div>
      <div><label>Nome do cliente</label><input id="cfgClient" class="inp" style="width:100%" placeholder="Cabana Burger"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>Keyword APP</label><input id="cfgApp" class="inp" placeholder="APP"/></div>
        <div><label>Keyword iFood</label><input id="cfgIfood" class="inp" placeholder="IFOOD"/></div>
      </div>
      <button class="btn btn-p" onclick="saveConfig()" style="padding:12px;font-size:14px;width:100%;margin-top:4px">Salvar →</button>
      <button class="btn" onclick="document.getElementById('modalCfg').classList.add('hidden')" style="padding:10px;width:100%">Cancelar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" class="lb hidden" onclick="closeLb()">
  <img id="lbImg" src="" alt=""/>
  <div id="lbN" class="lb-n"></div>
</div>

<!-- HEADER -->
<header style="background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06)">
  <div style="max-width:1320px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:28px;height:28px;background:var(--app);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span id="hdrName" style="font-size:15px;font-weight:800;letter-spacing:-.3px;color:#0f172a">Cabana Burger</span>
      <span style="background:#f1f5f9;color:var(--muted2);padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.5px;border:1px solid #e2e8f0">META ADS</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="display:flex;align-items:center;gap:6px;padding:4px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px">
        <span id="sDot" style="width:6px;height:6px;border-radius:50%;background:#cbd5e1;flex-shrink:0;transition:background .3s"></span>
        <span id="sTxt" style="font-size:11px;color:var(--muted)">—</span>
      </div>
    </div>
  </div>
</header>

<!-- FILTROS -->
<div style="background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:58px;z-index:90;box-shadow:0 1px 4px rgba(0,0,0,.04)">
  <div style="max-width:1320px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:12px">

    <!-- Account filter -->
    <div id="accountFilter" style="flex-shrink:0"></div>
    <div style="width:1px;height:18px;background:#e2e8f0;flex-shrink:0"></div>

    <!-- Date dropdown -->
    <div id="dateDropWrap" style="position:relative;flex-shrink:0">
      <button id="dateDropBtn" class="date-trigger-btn" onclick="toggleDateDrop()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="dateDropLabel">Mês anterior</span>
        <svg class="dt-chevron" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      <!-- Dropdown panel -->
      <div id="dateDrop" class="date-drop hidden">
        <button class="drop-opt" id="dp-this_month" onclick="pickPreset('this_month')">
          Este mês
          <svg class="check hidden" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="drop-opt" id="dp-last_month" onclick="pickPreset('last_month')">
          Mês anterior
          <svg class="check hidden" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="drop-opt" id="dp-last_7" onclick="pickPreset('last_7')">
          Últimos 7 dias
          <svg class="check hidden" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="drop-opt" id="dp-last_30" onclick="pickPreset('last_30')">
          Últimos 30 dias
          <svg class="check hidden" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="drop-opt" id="dp-last_90" onclick="pickPreset('last_90')">
          Últimos 90 dias
          <svg class="check hidden" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <div style="height:1px;background:#e2e8f0;margin:6px 4px"></div>
        <div style="padding:10px 8px 6px">
          <div style="font-size:10px;color:var(--muted2);font-weight:700;letter-spacing:.6px;margin-bottom:10px">PERSONALIZADO</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
            <div>
              <div style="font-size:10px;color:var(--muted2);font-weight:600;margin-bottom:5px">Início</div>
              <input type="date" id="customStart" class="date-inp"/>
            </div>
            <div>
              <div style="font-size:10px;color:var(--muted2);font-weight:600;margin-bottom:5px">Fim</div>
              <input type="date" id="customEnd" class="date-inp"/>
            </div>
          </div>
          <button onclick="applyCustomRange()" style="width:100%;padding:8px;background:var(--app);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;font-family:'Inter',sans-serif" onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='var(--app)'">Aplicar período →</button>
        </div>
      </div>
    </div>

    <!-- Campaign filter (populated after fetch) -->
    <div id="campaignFilter" style="display:flex;align-items:center;gap:6px;flex:1"></div>

    <!-- Buscar -->
    <div style="flex-shrink:0">
      <button class="btn btn-p" onclick="run()" style="padding:9px 24px;white-space:nowrap;display:flex;align-items:center;gap:7px">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.6"/></svg>
        Buscar dados
      </button>
    </div>

  </div>
</div>

<!-- MAIN -->
<main style="max-width:1320px;margin:0 auto;padding:32px 24px">
  <div id="content">
    <div style="text-align:center;padding:120px 0;color:var(--muted)">
      <div style="width:60px;height:60px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="26" height="26" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div style="font-size:16px;font-weight:700;color:#475569;margin-bottom:6px">Nenhum dado carregado</div>
      <div style="font-size:13px;color:#94a3b8">Selecione o período e clique em <strong style="color:#475569">Buscar dados</strong></div>
    </div>
  </div>
</main>

<footer style="text-align:center;padding:24px;color:#222;font-size:11px;border-top:1px solid #111;margin-top:12px">
  Dashboard Meta Ads &middot; <strong style="color:#2e2e2e">Imagenou Digital</strong>
</footer>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const DEFAULTS={
  token:"EAAbLb68XdEABP4ZAZBOgZAtxm2QPcyvzteXmaZBh0wcloTaeJTu9zuNpyOLRpAlYcIqbLDTsErxwSs96ytuBMKDORCbjIAclKNvFSnIj6mYCZCFKbiRB0tEEZBmxCaW5ZBg7pAn7jYuPZANZAtnPMxCMEXZATxzizbw6lv8UZC0XzvamKqA7mo1OOCZCGDnTrdA5",
  account:"act_849765918860539",
  client:"Cabana Burger",
  appKw:"APP",
  ifoodKw:"IFOOD",
};

// level=campaign — idêntico ao n8n
const FIELDS_INS=[
  "campaign_name","campaign_id","date_start","date_stop",
  "spend","cpc","cost_per_action_type","ctr","cpm",
  "actions","conversions","purchase_roas",
  "impressions","reach","clicks","frequency","inline_link_clicks"
].join(",");

// Criativos: inclui campaign + adset para identificar canal
const FIELDS_ADS="id,name,campaign{id,name},adset{id,name},status,creative{thumbnail_url,image_url}";

const API="https://graph.facebook.com/v24.0";
let CFG={},STATE={since:"",until:""},CHARTS={},fp,activePreset=null,lastData=null,monthlyRawRows=[];

// ── Multi-account ──
const ACCOUNT_LIST=[
  {id:"act_849765918860539",  name:"Cabana Burger"},
  {id:"act_1756246378351665", name:"Conta 2"},
  {id:"act_696203083188139",  name:"Conta 3"},
];
let activeAccountId=ACCOUNT_LIST[0].id;
const KPI_META={
  spend:      {lbl:"Investimento",   clr:"#22c55e",fmt:v=>R(v)},
  purchases:  {lbl:"Compras (App)", clr:"#10b981",fmt:v=>N(v)},
  linkClicks: {lbl:"Cliques iFood", clr:"#ef4444",fmt:v=>N(v)},
  clicks:     {lbl:"Total Cliques", clr:"#3b82f6",fmt:v=>N(v)},
  impressions:{lbl:"Impressões",    clr:"#8b5cf6",fmt:v=>N(v)},
  ctr:        {lbl:"CTR Médio",     clr:"#f59e0b",fmt:v=>parseFloat(v||0).toFixed(2)+"%"},
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener("DOMContentLoaded",()=>{
  try{CFG=JSON.parse(localStorage.getItem("metaCfg")||"{}");}catch(_){}
  if(!CFG.token) CFG={...DEFAULTS};
  // sync active account from config
  if(CFG.account&&ACCOUNT_LIST.find(a=>a.id===CFG.account)) activeAccountId=CFG.account;
  else CFG.account=activeAccountId;
  applyConfig();
  renderAccountFilter();
  fetchAccountNames();
  // Fechar dropdowns ao clicar fora
  document.addEventListener("click",e=>{
    if(!document.getElementById("dateDropWrap")?.contains(e.target)) closeDateDrop();
    if(!document.getElementById("campaignDropWrap")?.contains(e.target)) closeCampaignDrop();
    if(!document.getElementById("accountDropWrap")?.contains(e.target)) closeAccountDrop();
  });
  setPreset("last_month");
});
const iso=d=>d.toISOString().slice(0,10);

const PRESET_LABELS={"this_month":"Este mês","last_month":"Mês anterior","last_7":"Últimos 7 dias","last_30":"Últimos 30 dias","last_90":"Últimos 90 dias"};

function toggleDateDrop(){
  const drop=document.getElementById("dateDrop");
  const btn=document.getElementById("dateDropBtn");
  const isOpen=!drop.classList.contains("hidden");
  if(isOpen){closeDateDrop();}
  else{drop.classList.remove("hidden");btn.classList.add("open");}
}
function closeDateDrop(){
  document.getElementById("dateDrop")?.classList.add("hidden");
  document.getElementById("dateDropBtn")?.classList.remove("open");
}

function updateTriggerLabel(txt){
  const lbl=document.getElementById("dateDropLabel");
  if(lbl) lbl.textContent=txt;
}

function updateDropOpts(){
  document.querySelectorAll(".drop-opt").forEach(b=>{
    b.classList.remove("active");
    b.querySelector(".check")?.classList.add("hidden");
  });
  if(activePreset){
    const b=document.getElementById("dp-"+activePreset);
    if(b){b.classList.add("active");b.querySelector(".check")?.classList.remove("hidden");}
  }
}

function pickPreset(p){
  setPreset(p);
  closeDateDrop();
  run();
}

function setPreset(p){
  activePreset=p;
  preset(p);
  updateDropOpts();
  updateTriggerLabel(PRESET_LABELS[p]||p);
  // sync custom inputs to show current range
  const si=document.getElementById("customStart"),ei=document.getElementById("customEnd");
  if(si&&ei){si.value=STATE.since;ei.value=STATE.until;}
}

function applyCustomRange(){
  const s=document.getElementById("customStart").value;
  const e=document.getElementById("customEnd").value;
  if(!s||!e){return;}
  if(s>e){alert("A data de início deve ser anterior à data de fim.");return;}
  STATE.since=s;STATE.until=e;
  activePreset=null;
  updateDropOpts();
  updateTriggerLabel(DD(s)+" → "+DD(e));
  closeDateDrop();
  run();
}

function preset(p){
  const now=new Date(),utc=(y,m,d)=>new Date(Date.UTC(y,m,d));
  let s,e;
  if(p==="this_month"){s=utc(now.getUTCFullYear(),now.getUTCMonth(),1);e=utc(now.getUTCFullYear(),now.getUTCMonth()+1,0);}
  else if(p==="last_month"){const pm=now.getUTCMonth()-1,py=pm<0?now.getUTCFullYear()-1:now.getUTCFullYear(),pmf=pm<0?11:pm;s=utc(py,pmf,1);e=utc(py,pmf+1,0);}
  else if(p==="last_7"){s=new Date(Date.now()-6*864e5);e=new Date();}
  else if(p==="last_30"){s=new Date(Date.now()-29*864e5);e=new Date();}
  else{s=new Date(Date.now()-89*864e5);e=new Date();}
  STATE.since=iso(s);STATE.until=iso(e);
}

async function run(){
  if(!STATE.since||!STATE.until){alert("Selecione o período.");return;}
  setStatus("loading");renderLoading();
  try{
    const[ins,ads,mon]=await Promise.all([fetchInsights(),fetchAds(),fetchMonthlyInsights()]);
    monthlyRawRows=tagMonthlyRows(mon);
    render(process(ins,ads));
    setStatus("ready");
  }catch(err){setStatus("error");renderErr(err);}
}

async function fetchInsights(){
  const p=new URLSearchParams({
    level:"campaign",                          // ← nível de campanha, igual ao n8n
    time_range:JSON.stringify({since:STATE.since,until:STATE.until}),
    time_increment:"1",
    fields:FIELDS_INS,
    filtering:JSON.stringify([{field:"campaign.effective_status",operator:"IN",value:["ACTIVE","PAUSED"]}]),
    limit:"500",access_token:CFG.token,
  });
  return paginate(`${API}/${CFG.account}/insights?${p}`);
}

async function fetchAds(){
  const p=new URLSearchParams({
    fields:FIELDS_ADS,
    filtering:JSON.stringify([{field:"ad.effective_status",operator:"IN",value:["ACTIVE"]}]),
    limit:"100",access_token:CFG.token,
  });
  try{return paginate(`${API}/${CFG.account}/ads?${p}`);}
  catch(e){console.warn("Criativos:",e.message);return[];}
}

async function fetchMonthlyInsights(){
  const now=new Date();
  const s=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth()-5,1));
  const e=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth()+1,0));
  const p=new URLSearchParams({
    level:"campaign",
    time_range:JSON.stringify({since:iso(s),until:iso(e)}),
    time_increment:"monthly",
    fields:"campaign_name,date_start,date_stop,spend,impressions,clicks,inline_link_clicks,actions,ctr",
    filtering:JSON.stringify([{field:"campaign.effective_status",operator:"IN",value:["ACTIVE","PAUSED"]}]),
    limit:"500",access_token:CFG.token,
  });
  try{return await paginate(`${API}/${CFG.account}/insights?${p}`);}
  catch(e){console.warn("Monthly insights:",e.message);return[];}
}

async function paginate(url){
  let all=[],next=url;
  while(next){
    const res=await fetch(next),json=await res.json();
    if(json.error){
      const e=json.error;
      if(e.code===190)throw new Error("TOKEN_EXPIRED");
      if(e.code===200||e.code===10)throw new Error("PERMISSION");
      if(e.code===100)throw new Error("INVALID_PARAM: "+e.message);
      throw new Error(e.message);
    }
    all.push(...(json.data||[]));
    next=json.paging?.next||null;
  }
  return all;
}

// ══════════════════════════════════════════
//  PROCESS
//  Agrupa campanhas com mesmo nome-base
//  (remove a keyword APP/IFOOD do nome)
// ══════════════════════════════════════════
const PALETTE=["#dc2626","#b45309","#374151","#166534","#d97706","#7c3aed","#0369a1","#be185d","#0f766e","#9a3412"];
const _cc={},_ci={n:0};
function pickColor(n){if(!_cc[n])_cc[n]=PALETTE[(_ci.n++)%PALETTE.length];return _cc[n];}

// Detecta canal pelo nome da campanha
function getChannel(name, appKw, ifoodKw){
  const u=name.toUpperCase();
  // Testa primeiro IFOOD (mais específico)
  if(u.includes("["+ifoodKw+"]")||u.includes(ifoodKw)) return "ifood";
  if(u.includes("["+appKw+"]")  ||u.includes(appKw))   return "app";
  return "app"; // padrão
}

// Remove keyword do nome para obter nome-base do grupo
function baseName(name, appKw, ifoodKw){
  let b=name
    .replace(new RegExp("\\[\\s*"+appKw+"\\s*\\]","gi"),"")   // [APP] ou [ APP ]
    .replace(new RegExp("\\[\\s*"+ifoodKw+"\\s*\\]","gi"),"") // [IFOOD]
    .replace(new RegExp("[-_\\s]+"+appKw+"(?=[-_\\s\\[\\]]|$)","gi")," ") // _APP_ ou -APP-
    .replace(new RegExp("[-_\\s]+"+ifoodKw+"(?=[-_\\s\\[\\]]|$)","gi")," ")
    .replace(new RegExp("^"+appKw+"[-_\\s]*","gi"),"")         // APP no início
    .replace(new RegExp("^"+ifoodKw+"[-_\\s]*","gi"),"")
    .replace(/\[\s*\]/g,"")          // colchetes vazios
    .replace(/^[\s_\-]+|[\s_\-]+$/g,"") // início E fim
    .replace(/\s{2,}/g," ")          // espaços duplos
    .trim();
  return b||name;
}

// Chave normalizada para agrupamento (case-insensitive, whitespace colapsado)
function groupKey(base){
  return base.toLowerCase().replace(/\s+/g," ").trim();
}

function blank(){return{spend:0,impressions:0,clicks:0,reach:0,linkClicks:0,
  purchases:0,cpl:0,cpm:0,ctr:0,cpcLink:0,roas:0,frequency:0,
  _act:{},_roasSum:0,_roasW:0,_freqSum:0,_freqDays:0,campaignIds:[]};}

function acc(m,r){
  m.spend       +=parseFloat(r.spend||0);
  m.impressions +=parseInt(r.impressions||0);
  m.clicks      +=parseInt(r.clicks||0);
  m.reach       +=parseInt(r.reach||0);
  m.linkClicks  +=parseInt(r.inline_link_clicks||0);
  const freq=parseFloat(r.frequency||0),imp=parseInt(r.impressions||0);
  if(freq>0&&imp>0){m._freqSum+=freq*imp;m._freqDays+=imp;}
  (r.actions||[]).forEach(a=>{m._act[a.action_type]=(m._act[a.action_type]||0)+parseFloat(a.value||0);});
  (r.purchase_roas||[]).forEach(a=>{const v=parseFloat(a.value||0),s=parseFloat(r.spend||0);if(v>0&&s>0){m._roasSum+=v*s;m._roasW+=s;}});
  if(r.campaign_id&&!m.campaignIds.includes(r.campaign_id)) m.campaignIds.push(r.campaign_id);
}

function fin(m){
  m.purchases=m._act["purchase"]||m._act["offsite_conversion.fb_pixel_purchase"]||m._act["onsite_conversion.purchase"]||0;
  m.cpl      =m.purchases>0?m.spend/m.purchases:0;
  m.cpm      =m.impressions>0?m.spend/m.impressions*1000:0;
  m.ctr      =m.impressions>0?m.clicks/m.impressions*100:0;
  m.cpcLink  =m.linkClicks>0?m.spend/m.linkClicks:0;
  m.roas     =m._roasW>0?m._roasSum/m._roasW:0;
  m.frequency=m._freqDays>0?m._freqSum/m._freqDays:0;
}

function process(insightRows, adsRows){
  const appKw  =(CFG.appKw  ||"APP").toUpperCase();
  const ifoodKw=(CFG.ifoodKw||"IFOOD").toUpperCase();

  // ── 1. Agrupa por nome-base ──
  const groups={};   // key = nome-base
  const orderMap={}; // mantém ordem de aparecimento

  insightRows.forEach(r=>{
    const cname=r.campaign_name||"—";
    const ch   =getChannel(cname,appKw,ifoodKw);
    const base =baseName(cname,appKw,ifoodKw);
    const key  =groupKey(base);      // chave normalizada p/ agrupamento

    if(!groups[key]){
      groups[key]={base,color:pickColor(key),app:blank(),ifood:blank()};
      orderMap[key]=Object.keys(orderMap).length;
    }
    // mantém o display name mais curto como representante do grupo
    if(base.length < groups[key].base.length) groups[key].base=base;
    acc(groups[key][ch], r);
  });

  // ── 2. Criativos indexados por campaign_id ──
  // Agrupa thumbs por campaign_id e por canal (adset name)
  const thumbById={};  // {campaign_id: {app:[],ifood:[],all:[]}}
  adsRows.forEach(ad=>{
    const cr=ad.creative;if(!cr)return;
    const url=cr.thumbnail_url||cr.image_url;if(!url)return;
    const cid=ad.campaign?.id;if(!cid)return;
    const aname=(ad.adset?.name||"").toUpperCase();
    if(!thumbById[cid])thumbById[cid]={app:[],ifood:[],all:[]};
    const b=thumbById[cid];
    const entry={url,adName:ad.name||""};
    const dup=arr=>arr.some(x=>x.url===url);
    if(!dup(b.all))b.all.push(entry);
    if(aname.includes(ifoodKw)){if(!dup(b.ifood))b.ifood.push(entry);}
    else                       {if(!dup(b.app))  b.app.push(entry);}
  });

  // ── 3. Associa criativos a cada grupo por canal ──
  const campaigns=Object.values(groups)
    .sort((a,b)=>orderMap[groupKey(a.base)]-orderMap[groupKey(b.base)])
    .map(g=>{
      fin(g.app); fin(g.ifood);
      g.hasApp  =g.app.spend>0;
      g.hasIfood=g.ifood.spend>0;
      g.both    =g.hasApp&&g.hasIfood;
      g.investment=g.app.spend+g.ifood.spend;

      // Junta thumbs dos IDs de campanha de cada canal
      const merge=(ids,key)=>{
        const seen=new Set(),out=[];
        ids.forEach(id=>{(thumbById[id]?.[key]||[]).forEach(t=>{if(!seen.has(t.url)){seen.add(t.url);out.push(t);}});});
        return out;
      };
      g.thumbsApp  =merge(g.app.campaignIds,"app");
      g.thumbsIfood=merge(g.ifood.campaignIds,"ifood");
      // Se não separou por adset keyword, usa "all"
      if(!g.thumbsApp.length)   g.thumbsApp  =merge(g.app.campaignIds,"all");
      if(!g.thumbsIfood.length) g.thumbsIfood=merge(g.ifood.campaignIds,"all");

      return g;
    }).filter(g=>g.investment>0);

  campaigns.sort((a,b)=>b.investment-a.investment);
  const total=campaigns.reduce((s,c)=>s+c.investment,0);
  campaigns.forEach(c=>{c.pct=total>0?c.investment/total*100:0;});

  return{campaigns,total,since:STATE.since,until:STATE.until};
}

function tagMonthlyRows(rows){
  const appKw=(CFG.appKw||"APP").toUpperCase();
  const ifoodKw=(CFG.ifoodKw||"IFOOD").toUpperCase();
  return rows.map(r=>({
    ...r,
    _key:groupKey(baseName(r.campaign_name||"—",appKw,ifoodKw)),
    _spend:parseFloat(r.spend||0),
    _impressions:parseInt(r.impressions||0),
    _clicks:parseInt(r.clicks||0),
    _linkClicks:parseInt(r.inline_link_clicks||0),
    _ctr:parseFloat(r.ctr||0),
    _purchases:parseFloat((r.actions||[]).find(a=>["purchase","offsite_conversion.fb_pixel_purchase","onsite_conversion.purchase"].includes(a.action_type))?.value||0),
  }));
}

function aggregateMonthly(rows,selectedKeys){
  const filtered=selectedKeys&&selectedKeys.length?rows.filter(r=>selectedKeys.includes(r._key)):rows;
  const byMonth={};
  filtered.forEach(r=>{
    const mo=r.date_start?.slice(0,7);if(!mo)return;
    if(!byMonth[mo])byMonth[mo]={spend:0,impressions:0,clicks:0,linkClicks:0,purchases:0,_ctrSum:0,_ctrN:0};
    const m=byMonth[mo];
    m.spend+=r._spend;m.impressions+=r._impressions;m.clicks+=r._clicks;
    m.linkClicks+=r._linkClicks;m.purchases+=r._purchases;
    if(r._ctr>0){m._ctrSum+=r._ctr;m._ctrN++;}
  });
  return Object.entries(byMonth)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([month,m])=>({month,spend:m.spend,impressions:m.impressions,clicks:m.clicks,
      linkClicks:m.linkClicks,purchases:m.purchases,ctr:m._ctrN?m._ctrSum/m._ctrN:0}));
}

// Bloco de métricas com badge e número destacado (para duo)
function metricsBlock(m, type, showBadge){

// Linhas de métricas (grid 1 col, usado dentro do bloco)
function metricsRows(m, type){
  const isApp=type==="app";
  const rows=isApp
    ?[["CPL",           m.cpl>0?R(m.cpl):"—"],
      ["Valor investido",R(m.spend)],
      ["Cliques",       N(m.clicks)],
      ["Impressões",    N(m.impressions)],
      ["Alcance",       N(m.reach)],
      ["CPM",           R(m.cpm)],
      ["CTR",           m.ctr.toFixed(2)+"%"],
      ["Frequência",    m.frequency>0?m.frequency.toFixed(2):"—"],
      ["ROAS",          m.roas>0?m.roas.toFixed(2)+"x":"—"]]
    :[["CPC Link",      m.cpcLink>0?R(m.cpcLink):"—"],
      ["Valor investido",R(m.spend)],
      ["Cliques",       N(m.clicks)],
      ["Impressões",    N(m.impressions)],
      ["Alcance",       N(m.reach)],
      ["CPM",           R(m.cpm)],
      ["CTR",           m.ctr.toFixed(2)+"%"],
      ["Frequência",    m.frequency>0?m.frequency.toFixed(2):"—"]];
  return rows.map(([l,v])=>`<div class="mrow"><span class="mlabel">${l}</span><span class="mval">${v}</span></div>`).join("");
}

// Seção de comparação
function buildComparison(a, b){
  // retorna ["win","lose"] ou ["lose","win"] ou ["",""]
  const w=(av,bv,lower=false)=>{
    if(!av&&!bv)return["",""];if(!av)return["lose","win"];if(!bv)return["win","lose"];
    return lower?(av<bv?["win","lose"]:av>bv?["lose","win"]:["",""])
                :(av>bv?["win","lose"]:av<bv?["lose","win"]:["",""]);
  };
  const rows=[
    {l:"Investimento",   av:R(a.spend),            bv:R(b.spend),            wn:w(a.spend,b.spend)},
    {l:"Compras / Clicks",av:N(a.purchases),        bv:N(b.linkClicks),       wn:w(a.purchases,b.linkClicks)},
    {l:"CPL / CPC Link", av:a.cpl>0?R(a.cpl):"—",  bv:b.cpcLink>0?R(b.cpcLink):"—",wn:w(a.cpl||Infinity,b.cpcLink||Infinity,true)},
    {l:"CTR",            av:a.ctr.toFixed(2)+"%",   bv:b.ctr.toFixed(2)+"%",  wn:w(a.ctr,b.ctr)},
    {l:"CPM",            av:R(a.cpm),               bv:R(b.cpm),              wn:w(a.cpm,b.cpm,true)},
    {l:"Impressões",     av:N(a.impressions),        bv:N(b.impressions),      wn:w(a.impressions,b.impressions)},
    {l:"Frequência",     av:a.frequency>0?a.frequency.toFixed(2):"—",bv:b.frequency>0?b.frequency.toFixed(2):"—",wn:["",""]},
  ];
  return`
    ${rows.map(r=>`
      <div class="cmp-row">
        <div class="cmp-a"><span class="${r.wn[0]}">${r.av}</span></div>
        <div class="cmp-lbl">${r.l}</div>
        <div class="cmp-b"><span class="${r.wn[1]}">${r.bv}</span></div>
      </div>`).join("")}
    <div style="margin-top:10px;display:flex;gap:16px;font-size:10px">
      <span style="color:var(--app);font-weight:700">● Melhor</span>
      <span style="color:#374151">● Pior</span>
    </div>`;
}

function buildCharts(C){
  if(CHARTS.bar){CHARTS.bar.destroy();delete CHARTS.bar;}
  if(CHARTS.donut){CHARTS.donut.destroy();delete CHARTS.donut;}
  const labels=C.map(c=>c.base),colors=C.map(c=>c.color);
  const bar=document.getElementById("chartBar");
  if(bar)CHARTS.bar=new Chart(bar,{type:"bar",
    data:{labels,datasets:[
      {label:"App",  data:C.map(c=>+c.app.spend.toFixed(2)),  backgroundColor:"#22c55e",borderRadius:4},
      {label:"iFood",data:C.map(c=>+c.ifood.spend.toFixed(2)),backgroundColor:"#ec4899",borderRadius:4},
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:"#64748b",font:{size:11},padding:14}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${R(ctx.raw)}`}}},
    scales:{x:{stacked:true,ticks:{color:"#94a3b8",font:{size:10}},grid:{color:"#f1f5f9"}},y:{stacked:true,ticks:{color:"#94a3b8",font:{size:10},callback:v=>"R$"+N(v)},grid:{color:"#f1f5f9"}}}}});
  const dnt=document.getElementById("chartDonut");
  if(dnt)CHARTS.donut=new Chart(dnt,{type:"doughnut",
    data:{labels,datasets:[{data:C.map(c=>+c.investment.toFixed(2)),backgroundColor:colors,borderColor:"#fff",borderWidth:3}]},
    options:{responsive:true,cutout:"62%",plugins:{legend:{position:"right",labels:{color:"#64748b",font:{size:11},padding:12}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${R(ctx.raw)} (${C[ctx.dataIndex].pct.toFixed(1)}%)`}}}}});
}

function buildCampaignCharts(C){
  // destroy existing campaign mini charts
  Object.keys(CHARTS).filter(k=>k.startsWith("camp_")).forEach(k=>{CHARTS[k].destroy();delete CHARTS[k];});
  const MN=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  C.forEach((camp,i)=>{
    const el=document.getElementById("trendCamp"+i);
    if(!el)return;
    const monthlyAgg=aggregateMonthly(monthlyRawRows,[groupKey(camp.base)]);
    if(!monthlyAgg.length)return;
    const labels=monthlyAgg.map(m=>{const[y,mo]=m.month.split("-");return MN[parseInt(mo)-1]+"/"+y.slice(2);});
    // pick relevant metrics for this campaign
    const relevant=[];
    if(camp.hasApp||camp.both) relevant.push("spend","purchases");
    if(camp.hasIfood||camp.both) relevant.push("linkClicks");
    if(!camp.hasApp&&!camp.hasIfood) relevant.push("spend");
    const metrics=[...new Set(relevant)];
    if(!metrics.length)return;
    const datasets=metrics.map(metric=>{
      const cfg=KPI_META[metric];
      const values=monthlyAgg.map(m=>m[metric]||0);
      const maxVal=Math.max(...values,0.001);
      return{
        label:cfg.lbl,
        data:values.map(v=>+(v/maxVal*100).toFixed(1)),
        _raw:values,_fmt:cfg.fmt,
        borderColor:cfg.clr,backgroundColor:cfg.clr+"22",
        fill:true,tension:0.4,pointRadius:2,pointHoverRadius:5,borderWidth:1.5,
      };
    });
    CHARTS["camp_"+i]=new Chart(el,{
      type:"line",data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:"#fff",borderColor:"#e2e8f0",borderWidth:1,
            titleColor:"#64748b",bodyColor:"#0f172a",padding:8,
            callbacks:{label:ctx=>" "+ctx.dataset.label+": "+ctx.dataset._fmt(ctx.dataset._raw[ctx.dataIndex])}
          }
        },
        scales:{
          x:{ticks:{color:"#94a3b8",font:{size:9}},grid:{color:"#f1f5f9"}},
          y:{min:0,max:100,ticks:{color:"#94a3b8",font:{size:9},callback:v=>v+"%"},grid:{color:"#f1f5f9"}},
        }
      }
    });
  });
}

function toggleCampaignDrop(){
  const drop=document.getElementById("campaignDrop");
  const btn=document.getElementById("campaignDropBtn");
  const chev=document.getElementById("campChevron");
  const isOpen=!drop.classList.contains("hidden");
  if(isOpen){closeCampaignDrop();}
  else{
    drop.classList.remove("hidden");
    btn.style.borderColor="rgba(22,163,74,.5)";btn.style.color="#0f172a";
    chev.style.transform="rotate(180deg)";chev.style.opacity=".7";
  }
}
function closeCampaignDrop(){
  const drop=document.getElementById("campaignDrop");
  const btn=document.getElementById("campaignDropBtn");
  const chev=document.getElementById("campChevron");
  if(drop)drop.classList.add("hidden");
  if(btn){btn.style.borderColor="#e2e8f0";btn.style.color="var(--muted2)";}
  if(chev){chev.style.transform="";chev.style.opacity=".4";}
}
function toggleAllCampaigns(allCb){
  document.querySelectorAll(".camp-cb").forEach(cb=>{cb.checked=allCb.checked;});
  updateCampaignFilter();
}
function updateCampaignFilter(){
  const cbs=[...document.querySelectorAll(".camp-cb")];
  const checked=cbs.filter(cb=>cb.checked).map(cb=>cb.value);
  const total=cbs.length;
  const allCb=document.getElementById("cAll");
  const lbl=document.getElementById("campaignDropLabel");
  if(allCb){allCb.checked=checked.length===total;allCb.indeterminate=checked.length>0&&checked.length<total;}
  if(lbl){
    if(checked.length===0)lbl.textContent="Nenhuma campanha";
    else if(checked.length===total)lbl.textContent="Todas as campanhas";
    else if(checked.length===1)lbl.textContent=cbs.find(cb=>cb.value===checked[0])?.dataset.name||checked[0];
    else lbl.textContent=checked.length+" campanhas";
  }
  // show/hide campaign cards
  document.querySelectorAll(".campaign-card").forEach(el=>{
    el.style.display=(checked.length===0||checked.includes(el.dataset.key))?"block":"none";
  });
  // re-render KPIs, budget and charts for selected campaigns
  if(!lastData)return;
  const FC=checked.length===total
    ? lastData.campaigns
    : lastData.campaigns.filter(c=>checked.includes(groupKey(c.base)));
  const filteredTotal=FC.reduce((s,c)=>s+c.investment,0);
  // recalculate pct relative to filtered set
  const FCp=FC.map(c=>({...c,pct:filteredTotal>0?c.investment/filteredTotal*100:0}));
  // update banner numbers
  const bi=document.getElementById("bannerInvest");
  const bc=document.getElementById("bannerCamps");
  if(bi)bi.textContent=R(filteredTotal);
  if(bc)bc.textContent=FCp.length;
  // update KPI grid
  const ks=document.getElementById("kpiSection");
  if(ks) ks.innerHTML=kpiHTML(FCp,filteredTotal);
  // update budget table
  const bs=document.getElementById("budgetSection");
  if(bs)bs.innerHTML=budgetInnerHTML(FCp,filteredTotal);
  // rebuild charts
  buildCharts(FCp);
}

function openLb(url,name){document.getElementById("lbImg").src=url;document.getElementById("lbN").textContent=name;document.getElementById("lb").classList.remove("hidden");}
function closeLb(){document.getElementById("lb").classList.add("hidden");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});

const esc=s=>(s||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");
function R(v){return"R$ "+parseFloat(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function N(v){v=+v||0;if(v>=1e6)return(v/1e6).toFixed(1)+"M";if(v>=1e3)return(v/1e3).toFixed(0)+"K";return v.toLocaleString("pt-BR");}
function DD(s){const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function periodLabel(s,u){
  const MN=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const d0=new Date(s+"T00:00:00Z"),d1=new Date(u+"T00:00:00Z");
  if(d0.getUTCMonth()===d1.getUTCMonth()&&d0.getUTCFullYear()===d1.getUTCFullYear())
    return MN[d0.getUTCMonth()].toUpperCase()+" "+d0.getUTCFullYear();
  return MN[d0.getUTCMonth()]+" – "+MN[d1.getUTCMonth()]+" "+d1.getUTCFullYear();
}
